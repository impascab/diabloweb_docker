server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (DIABDAT.MPQ is ~700 MB)
    client_max_body_size 800M;

    # How long nginx waits between successive reads of the request body.
    # Default is 60s — not enough for a slow home WiFi upload that stalls briefly.
    client_body_timeout 600s;

    # Store the request body temp file on the persistent data volume, NOT in /tmp.
    # On many Docker setups /tmp is backed by tmpfs (RAM). A 700 MB MPQ in RAM
    # would OOM the container. /data is the host-mounted volume on real disk.
    client_body_temp_path /data/tmp 1 2;

    # Give uploads and downloads plenty of time over a home LAN
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout  10s;

    # How long nginx waits between successive writes TO the client.
    # Default 60s would drop a 700MB /api/serve/ download if the browser
    # stalls briefly (e.g. tab in background, slow device writing to disk).
    send_timeout          600s;

    # Required headers for SharedArrayBuffer / WebAssembly threading
    add_header Cross-Origin-Opener-Policy  "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Proxy all /api/ calls to the Node helper
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Stream the request body to Node as it arrives instead of buffering
        # the entire 700 MB MPQ in nginx's temp directory first.
        # Requires chunked transfer encoding (all modern browsers support this).
        proxy_request_buffering off;
        proxy_http_version      1.1;

        # nginx add_header inheritance rule: any block that defines its own
        # add_header directives stops inheriting from the parent server{} block.
        # So we must re-declare ALL three required headers explicitly here,
        # and hide the ones nginx would otherwise duplicate from the proxy response.
        proxy_hide_header  Cross-Origin-Opener-Policy;
        proxy_hide_header  Cross-Origin-Embedder-Policy;
        proxy_hide_header  Cross-Origin-Resource-Policy;
        add_header Cross-Origin-Opener-Policy   "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
    }

    # Static assets — cache aggressively (hashed filenames from CRA build)
    # Excludes diablo-manager.js so overlay updates are served immediately
    location ~* ^(?!.*diablo-manager).*\.(js|wasm|data|mem|png|ico|css)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # SharedArrayBuffer polyfill — no cache
    location = /sab-polyfill.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # COI service worker — must never be cached so updates take effect immediately.
    # Service-Worker-Allowed: / grants the worker scope over the entire origin.
    location = /coi-serviceworker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # COI registration script — no cache so it always runs fresh
    location = /coi-register.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Our overlay script — never cache so updates take effect immediately
    location = /diablo-manager.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
